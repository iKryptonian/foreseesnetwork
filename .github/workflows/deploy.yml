name: CI/CD — ForeseesNetwork

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────
  # JOB 1 — Build Docker Images
  # ─────────────────────────────────────────
  build:
    name: Build Docker Images
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Server image
        run: |
          docker build -t livechat-server:latest ./server

      - name: Build Client image
        run: |
          docker build -t livechat-client:latest .

  # ─────────────────────────────────────────
  # JOB 2 — Deploy to Kubernetes
  # ─────────────────────────────────────────
  deploy:
    name: Deploy to Kubernetes
    runs-on: self-hosted
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    env:
      KUBECONFIG: /Users/nivashp/.kube/config

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Load images into Minikube
        run: |
          minikube image load livechat-server:latest
          minikube image load livechat-client:latest

      - name: Configure kubeconfig
        run: |
          mkdir -p /Users/nivashp/.kube
          cat > /Users/nivashp/.kube/config << 'EOF'
          apiVersion: v1
          clusters:
          - cluster:
              certificate-authority-data: ${{ secrets.MINIKUBE_CA_CRT }}
              server: https://127.0.0.1:59468
            name: minikube
          contexts:
          - context:
              cluster: minikube
              user: minikube
            name: minikube
          current-context: minikube
          kind: Config
          users:
          - name: minikube
            user:
              client-certificate-data: ${{ secrets.MINIKUBE_CLIENT_CRT }}
              client-key-data: ${{ secrets.MINIKUBE_CLIENT_KEY }}
          EOF
          chmod 600 /Users/nivashp/.kube/config

      - name: Apply Kubernetes manifests
        run: kubectl apply -f k8s/ --namespace=foreseesnetwork

      - name: Wait for rollout — Server
        run: |
          kubectl rollout status deployment/server \
            --namespace=foreseesnetwork \
            --timeout=300s

      - name: Wait for rollout — Client
        run: |
          kubectl rollout status deployment/client \
            --namespace=foreseesnetwork \
            --timeout=300s

      - name: Verify pods are running
        run: kubectl get pods --namespace=foreseesnetwork

  # ─────────────────────────────────────────
  # JOB 3 — Notify on Failure
  # ─────────────────────────────────────────
  notify:
    name: Notify on Failure
    runs-on: self-hosted
    needs: [build, deploy]
    if: failure()

    steps:
      - name: Send failure notification
        run: |
          echo "❌ CI/CD pipeline failed for commit ${{ github.sha }}"
          echo "Branch: ${{ github.ref_name }}"
          echo "Triggered by: ${{ github.actor }}"