name: CI/CD — ForeseesNetwork

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_SERVER: ghcr.io/${{ github.repository_owner }}/livechat-server
  IMAGE_CLIENT: ghcr.io/${{ github.repository_owner }}/livechat-client

jobs:
  # ─────────────────────────────────────────
  # JOB 1 — Build & Push Docker Images
  # ─────────────────────────────────────────
  build:
    name: Build & Push Docker Images
    runs-on: self-hosted
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata (tags) — Server
        id: meta-server
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_SERVER }}
          tags: |
            type=sha,prefix=,suffix=,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Extract metadata (tags) — Client
        id: meta-client
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_CLIENT }}
          tags: |
            type=sha,prefix=,suffix=,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build & Push — Server
        uses: docker/build-push-action@v5
        with:
          context: ./server
          file: ./server/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta-server.outputs.tags }}
          labels: ${{ steps.meta-server.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & Push — Client
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta-client.outputs.tags }}
          labels: ${{ steps.meta-client.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────
  # JOB 2 — Deploy to Kubernetes
  # ─────────────────────────────────────────
  deploy:
    name: Deploy to Kubernetes
    runs-on: self-hosted
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    env:
      KUBECONFIG: /Users/nivashp/.kube/config

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure kubeconfig
        run: |
          mkdir -p /Users/nivashp/.kube
          cat > /Users/nivashp/.kube/config << 'EOF'
          apiVersion: v1
          clusters:
          - cluster:
              certificate-authority-data: ${{ secrets.MINIKUBE_CA_CRT }}
              server: https://127.0.0.1:59468
            name: minikube
          contexts:
          - context:
              cluster: minikube
              user: minikube
            name: minikube
          current-context: minikube
          kind: Config
          users:
          - name: minikube
            user:
              client-certificate-data: ${{ secrets.MINIKUBE_CLIENT_CRT }}
              client-key-data: ${{ secrets.MINIKUBE_CLIENT_KEY }}
          EOF
          chmod 600 /Users/nivashp/.kube/config

      - name: Set image tag (short SHA)
        id: vars
        run: echo "SHA=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Update image tags in K8s manifests
        run: |
          SHORT_SHA=${{ steps.vars.outputs.SHA }}
          sed -i "" "s|livechat-server:latest|${{ env.IMAGE_SERVER }}:${SHORT_SHA}|g" k8s/server.yml
          sed -i "" "s|livechat-client:latest|${{ env.IMAGE_CLIENT }}:${SHORT_SHA}|g" k8s/client.yml

      - name: Apply Kubernetes manifests
        run: kubectl apply -f k8s/ --namespace=foreseesnetwork

      - name: Wait for rollout — Server
        run: |
          kubectl rollout status deployment/livechat-server \
            --namespace=foreseesnetwork \
            --timeout=120s

      - name: Wait for rollout — Client
        run: |
          kubectl rollout status deployment/livechat-client \
            --namespace=foreseesnetwork \
            --timeout=120s

      - name: Verify pods are running
        run: kubectl get pods --namespace=foreseesnetwork

  # ─────────────────────────────────────────
  # JOB 3 — Notify on Failure
  # ─────────────────────────────────────────
  notify:
    name: Notify on Failure
    runs-on: self-hosted
    needs: [build, deploy]
    if: failure()

    steps:
      - name: Send failure notification
        run: |
          echo "❌ CI/CD pipeline failed for commit ${{ github.sha }}"
          echo "Branch: ${{ github.ref_name }}"
          echo "Triggered by: ${{ github.actor }}"
          # Uncomment to enable Slack/Discord:
          # curl -X POST -H 'Content-type: application/json' \
          #   --data '{"text":"❌ ForeseesNetwork deploy failed!"}' \
          #   ${{ secrets.SLACK_WEBHOOK_URL }}