name: CI/CD — ForeseesNetwork

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────
  # JOB 1 — Build Docker Images
  # ─────────────────────────────────────────
  build:
    name: Build Docker Images
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Server image
        run: docker build -t livechat-server:latest ./server

      - name: Build Client image
        run: docker build -t livechat-client:latest .

  # ─────────────────────────────────────────
  # JOB 2 — Deploy to Kubernetes
  # ─────────────────────────────────────────
  deploy:
    name: Deploy to Kubernetes
    runs-on: self-hosted
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    env:
      KUBECONFIG: /Users/nivashp/.kube/config
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Auto-update Minikube certs in GitHub Secrets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh secret set MINIKUBE_CA_CRT \
            --body "$(cat ~/.minikube/ca.crt | base64 | tr -d '\n')" \
            --repo ${{ github.repository }}
          gh secret set MINIKUBE_CLIENT_CRT \
            --body "$(cat ~/.minikube/profiles/minikube/client.crt | base64 | tr -d '\n')" \
            --repo ${{ github.repository }}
          gh secret set MINIKUBE_CLIENT_KEY \
            --body "$(cat ~/.minikube/profiles/minikube/client.key | base64 | tr -d '\n')" \
            --repo ${{ github.repository }}

      - name: Configure kubeconfig
        run: |
          mkdir -p /Users/nivashp/.kube
          MINIKUBE_PORT=$(minikube ip 2>/dev/null | xargs -I{} kubectl config view --raw -o jsonpath='{.clusters[?(@.name=="minikube")].cluster.server}' | grep -oE '[0-9]+$' || echo "8443")
          MINIKUBE_SERVER=$(kubectl config view --raw -o jsonpath='{.clusters[?(@.name=="minikube")].cluster.server}')
          cat > /Users/nivashp/.kube/config << EOF
          apiVersion: v1
          clusters:
          - cluster:
              certificate-authority-data: $(cat ~/.minikube/ca.crt | base64 | tr -d '\n')
              server: ${MINIKUBE_SERVER}
            name: minikube
          contexts:
          - context:
              cluster: minikube
              user: minikube
            name: minikube
          current-context: minikube
          kind: Config
          users:
          - name: minikube
            user:
              client-certificate-data: $(cat ~/.minikube/profiles/minikube/client.crt | base64 | tr -d '\n')
              client-key-data: $(cat ~/.minikube/profiles/minikube/client.key | base64 | tr -d '\n')
          EOF
          chmod 600 /Users/nivashp/.kube/config

      - name: Load images into Minikube
        run: |
          minikube image load livechat-server:latest
          minikube image load livechat-client:latest

      - name: Apply Kubernetes manifests
        run: kubectl apply -f k8s/

      - name: Wait for rollout — Server
        run: |
          kubectl rollout status deployment/server \
            --namespace=foreseesnetwork \
            --timeout=300s

      - name: Wait for rollout — Client
        run: |
          kubectl rollout status deployment/client \
            --namespace=foreseesnetwork \
            --timeout=300s

      - name: Verify pods are running
        run: kubectl get pods --namespace=foreseesnetwork

  # ─────────────────────────────────────────
  # JOB 3 — Notify on Failure
  # ─────────────────────────────────────────
  notify:
    name: Notify on Failure
    runs-on: self-hosted
    needs: [build, deploy]
    if: failure()
    steps:
      - name: Send failure notification
        run: |
          echo "❌ CI/CD pipeline failed for commit ${{ github.sha }}"
          echo "Branch: ${{ github.ref_name }}"
          echo "Triggered by: ${{ github.actor }}"